version: 1
name: plan_refine_workers

# ORCHESTRATOR: Run this queue BEFORE the implementation pipeline.
# Oneshot mode recommended. The worker reviews/refines the plan and
# decomposes it into implementation beads (labeled needs-impl).
# Only start impl queues after this queue drains.

source:
  label: needs-plan-refine

workers:
  count: 1
  provider: claude
  model: claude-opus-4
  effort: high
  prompt: prompts/plan_refine_prompt.md

transitions:
  "plan-refine:approved": plan-refined
  "plan-refine:rework": needs-plan-refine

timeout: 2h
