version: 1
name: plan_verify_workers

# Run AFTER all implementation beads have drained (no beads with needs-impl label).
# The worker compares implementation against the plan using cross-provider review.
# If plan-verify:failed, the worker creates follow-up beads (labeled needs-impl).
# Re-run impl queue, then re-run this queue — the cycle repeats until plan passes.

source:
  label: needs-plan-verify

workers:
  count: 1
  provider: claude
  model: claude-opus-4
  effort: high
  prompt: prompts/plan_verify_prompt.md

transitions:
  "plan-verify:passed": plan-done
  "plan-verify:failed": needs-plan-verify

timeout: 2h
