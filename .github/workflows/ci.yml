name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli/bsw
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/bsw/go.mod
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: cli/bsw

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli/bsw
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/bsw/go.mod
      - name: Run tests
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: Coverage summary
        run: go tool cover -func=coverage.out
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: cli/bsw/coverage.out

  eval:
    name: Eval (scenario_basic)
    runs-on: ubuntu-latest
    needs: [test]
    continue-on-error: true
    env:
      AGENT_MAIL_URL: ""
      AGENT_MAIL_TOKEN: ""
      VAULT_ADDR: ""
      VAULT_TOKEN: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/bsw/go.mod
      - name: Build bsw
        run: cd cli/bsw && go build -o bsw .
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: Run scenario_basic
        run: |
          export PATH="$PWD/cli/bsw:$PATH"
          cd eval
          bash scenario_basic.sh
