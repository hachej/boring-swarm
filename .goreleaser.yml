version: 2

project_name: bsw

before:
  hooks:
    - go mod tidy

builds:
  - id: bsw
    dir: cli/bsw
    binary: bsw
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}}

archives:
  - id: bsw
    builds:
      - bsw
    format: tar.gz
    name_template: "bsw_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  github:
    owner: boringdata
    name: boring-swarm
  draft: false
  prerelease: auto
